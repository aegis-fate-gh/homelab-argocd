apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: post-sync-jobs
  finalizers:
  # Delete deployed resources when the Application is deleted
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    path: manifests/post-sync-jobs/base
    repoURL: https://github.com/aegis-fate-gh/homelab-argocd
    targetRevision: main
    directory:
      recurse: false # Set to true to track manifests in subdirectories
      include: '{*.yaml,*.yml}' # Only process these file patterns
  syncPolicy:
    syncOptions:
      - Replace=true
  destination:
    namespace: argocd
    server: https://kubernetes.default.svc
