apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: snapotter
  finalizers:
  # Delete deployed resources when the Application is deleted
  - resources-finalizer.argocd.argoproj.io
spec:
  project: jovian
  source:
    path: manifests/snapotter/base
    repoURL: https://github.com/aegis-fate-gh/homelab-argocd
    targetRevision: main
    directory:
      recurse: false # Set to true to track manifests in subdirectories
      include: '{*.yaml,*.yml}' # Only process these file patterns
  destination:
    namespace: jovian-prod
    server: https://kubernetes.default.svc
