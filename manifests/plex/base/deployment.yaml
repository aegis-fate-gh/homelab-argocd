apiVersion: apps/v1
kind: Deployment
metadata:
  name: plex
  namespace: jovian-prod
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: plex
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: plex
    spec:
      runtimeClassName: nvidia
      nodeSelector:
        gpu: rtx4060
      containers:
      - name: plex-alloy
        image: grafana/alloy:latest
        imagePullPolicy: Always
        args: ["run", "--server.http.listen-addr=0.0.0.0:12345", "--storage.path=/var/lib/alloy/data", "/etc/alloy/config.alloy"]
        env:
        - name: TZ
          value: 'America/Chicago'
        - name: PUID
          value: '1000'
        - name: PGID
          value: '1000'
        ports:
        - containerPort: 12345
          name: plex-alloy
        volumeMounts:
        - name: alloy-config
          mountPath: /etc/alloy
        - name: config
          mountPath: /plex
          readOnly: true
      - name: plex
        image: plexinc/pms-docker:latest
        imagePullPolicy: Always
        securityContext:
          privileged: true
        ports:
        - containerPort: 32400
          name: plex
          protocol: TCP
        - containerPort: 32410
          name: plex-gdm-1
          protocol: UDP
        - containerPort: 32412
          name: plex-gdm-2
          protocol: UDP
        - containerPort: 32413
          name: plex-gdm-3
          protocol: UDP
        - containerPort: 32414
          name: plex-gdm-4
          protocol: UDP       
        volumeMounts:
        - name: config
          mountPath: /config
        - name: nfs-media
          mountPath: /nfs-media
          readOnly: true
        - name: plex-transcode
          mountPath: /transcode
        - name: dev-dri
          mountPath: /dev/dri
          readOnly: true
        env:
        - name: ADVERTISE_IP
          value: 'http://192.168.6.220:32430/'
        - name: ALLOWED_NETWORKS
          value: 192.168.6.0/24,192.168.2.0/26,192.168.100.0/24
        - name: PLEX_CLAIM
          value: "{{ PLEX_CLAIM }}"
        - name: PLEX_UID
          value: "1000"
        - name: PLEX_GID
          value: "1000"
        - name: HOSTNAME
          value: plex
        - name: NVIDIA_VISIBLE_DEVICES 
          value: "all"
        - name: NVIDIA_DRIVER_CAPABILITIES
          value: compute,video,utility
      volumes:
      - name: config
        persistentVolumeClaim:
          claimName: plex-pvc
          readOnly: false
      - name: plex-transcode
        hostPath:
          path: /dev/shm
      - name: dev-dri
        hostPath:
          path: /dev/dri
      - name: nfs-media
        persistentVolumeClaim:
          claimName: plex-smb-media-pvc
          readOnly: true
      - name: alloy-config
        configMap:
          name: plex-alloy-config
