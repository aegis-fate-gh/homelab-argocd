      #         echo "IP is masked as $IP. Proceeding..."
      #       fi
      containers:
      - name: qbittorrent
        image: ghcr.io/hotio/qbittorrent:release-3170680
        imagePullPolicy: IfNotPresent
        securityContext:
          capabilities:
            add:
            - 'NET_ADMIN'
        volumeMounts:
        - name: config
          mountPath: /config
        - name: nfs-media
          mountPath: /nfs-media
        - name: wg-conf
          mountPath: /config/wireguard/wg0.conf
          subPath: wg0.conf
          readOnly: true
        ports:
        - containerPort: 8080
          name: qbitt-http
          protocol: TCP
        env:
        - name: TZ
          value: 'America/Chicago'
        - name: PUID
          value: '1000'
        - name: PGID
          value: '1000'
        - name: WEBUI_PORTS
          value: '8080/tcp,8080/udp'
        - name: LIBTORRENT
          value: 'v1'
        - name: VPN_ENABLED
          value: 'true'
        - name: VPN_PROVIDER
          valueFrom:
            secretKeyRef:
              name: qbittorrent-secrets
              key: port_forwarding_provider
        - name: VPN_EXPOSE_PORTS_ON_LAN
          value: '8080/tcp,8080/udp'
        - name: VPN_LAN_NETWORK
          value: '10.42.0.0/24,192.168.6.0/24'
      volumes:
      - name: config
        persistentVolumeClaim:
          claimName: qbittorrent-pvc
          readOnly: false
      - name: nfs-media
        persistentVolumeClaim:
          claimName: qbittorrent-smb-media-pvc
      - name: dev-net-tun
        hostPath:
          path: /dev/net/tun
      - name: wg-conf
        secret:
          secretName: qbittorrent-wg-conf
